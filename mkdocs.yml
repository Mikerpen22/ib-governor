site_name: ib-governor
site_description: A behavioral circuit-breaker + pre-trade gate for Interactive Brokers (IBKR) trading discipline
repo_url: https://github.com/Mikerpen22/ib-governor
repo_name: Mikerpen22/ib-governor
docs_dir: docs
theme:
  name: material
  icon:
    logo: material/hand-back-right-off
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: true
            heading_level: 2
nav:
  - Home: index.md
  - Operator's Handbook: HANDBOOK.md
  - Rule Catalog: RULES.md
  - Architecture & Lessons: FORCLAUDE.md
  - Security: SECURITY.md
  - API Reference:
      - Overview: reference/index.md
      - Domain model & config: reference/model.md
      - Rules & engine: reference/rules.md
      - Pre-trade gate: reference/gate.md
      - Live daemon & snapshot: reference/live.md
      - Actions & state: reference/actions.md
